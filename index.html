<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEON — Personal AI Operating System</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>SEON</h1>
        <p class="caption">Personal AI Operating System</p>
        <nav>
          <button class="menu active">Projects</button>
          <button class="menu">AI Crew</button>
          <button class="menu">Missions</button>
          <button class="menu">Results</button>
        </nav>
        <section class="panel">
          <h2>AI Crew</h2>
          <ul id="crew-list"></ul>
        </section>
      </aside>

      <main class="main">
        <header>
          <h2>CEO Command Center</h2>
          <p>아이디어를 입력하면 AI 팀이 회의하고 실행 후 보고합니다.</p>
        </header>

        <section class="input-box">
          <textarea
            id="user-input"
            placeholder="예: SkyBanner 홈페이지 UX 개선 방향을 설계해줘"
          ></textarea>
          <button id="run-btn">AI Crew 회의 시작</button>
        </section>

        <section class="columns">
          <article>
            <h3>AI 회의 로그</h3>
            <div id="meeting-log" class="card"></div>
          </article>
          <article>
            <h3>Final Proposal</h3>
            <div id="final-proposal" class="card"></div>
          </article>
        </section>

        <section>
          <h3>Missions</h3>
          <div id="missions" class="card"></div>
        </section>

        <section>
          <h3>Results Archive</h3>
          <div id="results" class="card"></div>
        </section>
      </main>
    </div>

    <script>
      window.buildColorPicker = window.buildColorPicker || function () {
        return null;
      };
    </script>

    <script src="./app.js" type="module"></script>
  </body>
</html>
