const API_BASE = "https://seon.rovenso92.workers.dev";

/** Claude 호출 래퍼 (proxy worker 기준) */
async function callClaude(payload){
  const r = await fetch(`${API_BASE}/proxy`, {
    method: "POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });
  const data = await r.json();
  return data;
}

function extractClaudeText(d){
  if(!d) return "응답 없음";
  if(Array.isArray(d.content)) return d.content.map(c=>c.text||"").join("");
  if(typeof d.reply === "string") return d.reply;
  if(typeof d.text === "string") return d.text;
  return "응답 없음";
}

function allCrews(){ return [...DEFAULT_CREWS, ...S.customCrews]; }
function getCrewById(id){ return allCrews().find(c=>c.id===id); }
function getPjById(id){ return S.projects.find(p=>p.id===id); }
function histKey(){ return `${S.currentPj}_${S.currentCrew}`; }
function getHist(){ return S.history[histKey()]||[]; }
function setHist(h){ S.history[histKey()]=h; persist(); }

function esc(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMsg(text){
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^###\s+(.+)$/gm,'<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm,'<h3 style="font-size:14px">$1</h3>')
    .replace(/\n/g,'<br>');
}

function persist(){
  try{
    const customForSave = S.customCrews.map(c=>({...c, sys:undefined, sysText: c._sysText||''}));
    localStorage.setItem(SK, JSON.stringify({
      projects:S.projects, currentPj:S.currentPj, currentCrew:S.currentCrew,
      history:S.history, bookmarks:S.bookmarks, docs:S.docs,
      todos:S.todos||[], customCrews:customForSave, theme:S.theme
    }));
  }catch(e){}
}

function applyTheme(){ document.body.classList.toggle('dark', S.theme==='dark'); }

function boot(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      const d=JSON.parse(raw);
      S.projects=d.projects||[];
      S.projects.forEach(p=>{ if(!p.brandMd) p.brandMd=makeBrandTemplate(p); });
      S.currentPj=d.currentPj||null;
      S.currentCrew=d.currentCrew||null;
      S.history=d.history||{};
      S.bookmarks=d.bookmarks||[];
      S.docs=d.docs||[];
      S.todos=d.todos||[];
      S.theme=d.theme||'light';
      S.customCrews=(d.customCrews||[]).map(c=>{
        const sysText=c.sysText||`너는 ${c.name}이야. ${c.role} 전문가야. 실무적으로 답해줘. 한국어.`;
        return {...c, _sysText:sysText, sys:(_p)=>sysText};
      });
    }
  }catch(e){ console.warn('boot error',e); }
  applyTheme();
  renderAll();
  if(S.currentPj){
    S.currentPj=S.projects.find(p=>p.id===S.currentPj)?.id||S.projects[0]?.id||null;
    if(S.currentPj){
      renderPjList(); renderCrewList(); updateTopbar(); updateQBar(); updateHint();
      if(S.currentCrew){ renderMsgs(); }
      else{ showNoCrew(); }
    } else { showNoProject(); }
  } else { showNoProject(); }
}

/* =========================
   핵심: SEND MESSAGE (Claude 연동 정상화)
========================= */
async function sendMsg(txt){
  const box=document.getElementById('inputBox');
  const text=(txt!==undefined ? txt : box.value).trim();
  if(!text) return;
  if(!S.currentPj){ toast('프로젝트를 선택해주세요'); return; }
  if(!S.currentCrew){ toast('팀원을 선택해주세요'); return; }

  const hist=getHist();
  hist.push({role:'user',content:text});
  setHist(hist);

  if(txt===undefined){
    box.value='';
    box.style.height='auto';
  }

  renderMsgs(); addLoading();

  const crew=getCrewById(S.currentCrew);
  const pj=getPjById(S.currentPj);

  const baseSys=typeof crew.sys==='function'?crew.sys(pj):crew.sys;
  const brandMd=(pj?.brandMd||'').trim();
  const sys=baseSys + (brandMd?(`\n\n[브랜드.md]\n${brandMd}`):'');

  try{
    const d = await callClaude({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      system: sys,
      messages: hist.map(m => ({ role: m.role, content: m.content }))
    });

    if(d?.error) throw new Error(d.error.message||'API 오류');

    const reply = extractClaudeText(d) || '응답을 받지 못했어요.';
    removeLoading();
    hist.push({role:'assistant',content:reply});
    setHist(hist);
    renderMsgs();
  }catch(e){
    removeLoading();
    const errMsg =
      (e.message?.includes('fetch') || e.message?.includes('Failed'))
        ? '⚠️ 네트워크 오류예요. 프록시(API_BASE) 상태를 확인해주세요.'
        : `⚠️ 오류: ${e.message||'알 수 없는 오류'}`;
    hist.push({role:'assistant',content:errMsg});
    setHist(hist);
    renderMsgs();
  }
}

/* =========================
   (이하) 원본 기능들 그대로: renderMsgs, toast, 모달, 멀티, 릴레이 등
   ✅ 단, 멀티/릴레이/호출에서 "proxy"를 반드시 API_BASE로 통일
========================= */

/* ---- 여기부터는 "너가 준 원본 함수들"을 그대로 붙이면 됨.
   중요한 건:
   - runMulti() 내부 fetch -> callClaude()로 바꾸거나 API_BASE/proxy로 통일
   - startRelay/sendRelayMsg/summonCrew 내부 fetch -> callClaude() 사용
   아래에 대표적으로 필요한 3개만 안전하게 교체 버전으로 제공함
---- */

async function runMulti(){
  const q=document.getElementById('multiQ')?.value.trim();
  if(!q){ toast('질문을 입력해주세요'); return; }
  if(multiSel.size===0){ toast('팀원을 선택해주세요'); return; }
  const pj=getPjById(S.currentPj);
  closeMultiModal?.();

  const crews=allCrews().filter(c=>multiSel.has(c.id));
  const el=document.getElementById('messages');
  el.innerHTML=`<div class="multi-wrap"><div class="multi-hd">⊕ 멀티 브리핑 — ${esc(q)}</div><div id="multiLoading" style="padding:20px;text-align:center;color:var(--text3);font-size:13px">${crews.length}명 검토 중<div class="loading-dots" style="justify-content:center;margin-top:10px"><span></span><span></span><span></span></div></div></div>`;

  const results=await Promise.allSettled(crews.map(async crew=>{
    const sys=typeof crew.sys==='function'?crew.sys(pj):crew.sys;
    const d = await callClaude({
      model:'claude-sonnet-4-6',
      max_tokens:800,
      system:sys,
      messages:[{role:'user',content:q}]
    });
    if(d?.error) throw new Error(d.error.message||'API 오류');
    return {crew, reply: extractClaudeText(d) || '응답을 받지 못했어요.'};
  }));

  el.innerHTML=`<div class="multi-wrap"><div class="multi-hd">⊕ 멀티 브리핑 — ${esc(q)}</div>${
    results.map((r,ri)=>r.status==='rejected'?'':
      `<div class="multi-card"><div class="mc-head"><span class="mc-emoji">${r.value.crew.emoji}</span><div><div class="mc-name" style="color:${r.value.crew.color}">${esc(r.value.crew.name)}</div><div class="mc-role">${esc(r.value.crew.role)}</div></div><button class="mc-copy" data-ri="${ri}" onclick="multiCopy(this)">📋 복사</button></div><div class="mc-body">${fmtMsg(r.value.reply)}</div></div>`
    ).join('')
  }</div>`;

  const successResults = results.filter(r=>r.status==='fulfilled');
  el.querySelectorAll('.mc-copy').forEach((btn,i)=>{
    if(successResults[i]) btn.dataset.text = successResults[i].value.reply;
  });
  el.scrollTop=0;
}

async function sendRelayMsg(text, fromCrewName){
  if(!S.relayHistKey) return;
  const hist = S.history[S.relayHistKey] || [];
  hist.push({role:'user', content:text});
  S.history[S.relayHistKey]=hist; persist();

  const displayHist=getHist();
  displayHist.push({role:'user',content:text});
  setHist(displayHist);

  renderMsgs(); addLoading();

  const crew=getCrewById(S.currentCrew);
  const pj=getPjById(S.currentPj);
  const sys=typeof crew.sys==='function'?crew.sys(pj):crew.sys;

  try{
    const d = await callClaude({
      model:'claude-sonnet-4-6',
      max_tokens:1500,
      system:sys,
      messages:hist.map(m=>({role:m.role,content:m.content}))
    });
    if(d?.error) throw new Error(d.error.message||'API 오류');

    const reply = extractClaudeText(d) || '응답을 받지 못했어요.';
    hist.push({role:'assistant',content:reply});
    S.history[S.relayHistKey]=hist; persist();

    removeLoading();
    displayHist.push({role:'assistant',content:reply, fromRelay:fromCrewName||null});
    setHist(displayHist); renderMsgs();

    if(S.relayIdx < S.relayQueue.length-1){ runNextRelay(reply); }
    else{ clearRelay(); toast('✦ 릴레이 협업 완료!'); }
  }catch(e){
    removeLoading(); clearRelay();
    toast('릴레이 중 오류: ' + (e.message||'네트워크 확인'));
  }
}

async function summonCrew(crewId, msgIdx){
  closeSummon?.();
  const hist = getHist();
  const targetMsg = hist[msgIdx];
  const prevCrew = getCrewById(S.currentCrew);
  const newCrew = getCrewById(crewId);
  const pj = getPjById(S.currentPj);
  if(!newCrew || !pj) return;

  S.currentCrew = crewId;
  renderCrewList(); updateTopbar(); updateQBar(); updateHint();

  const contextSummary = hist.slice(Math.max(0, msgIdx-3), msgIdx+1)
    .map(m => `[${m.role==='user'?'나':prevCrew?.name}]: ${m.content}`)
    .join('\n');

  const summonPrompt = `[대화 중 호출 — ${prevCrew?.name}과의 대화를 이어받아]

이전 대화 흐름:
${contextSummary}

위 대화를 참고해서 당신의 전문 분야(${newCrew.role}) 관점에서 추가 의견이나 보완점을 알려줘.`;

  const newHist = getHist();
  newHist.push({role:'user', content:summonPrompt});
  setHist(newHist);
  renderMsgs(); addLoading();

  const sys = typeof newCrew.sys==='function' ? newCrew.sys(pj) : newCrew.sys;

  try{
    const d = await callClaude({
      model:'claude-sonnet-4-6',
      max_tokens:1500,
      system:sys,
      messages:newHist.map(m=>({role:m.role, content:m.content}))
    });
    if(d?.error) throw new Error(d.error.message||'API 오류');

    const reply = extractClaudeText(d) || '응답을 받지 못했어요.';
    removeLoading();
    newHist.push({role:'assistant', content:reply, summonedFrom:prevCrew?.name});
    setHist(newHist); renderMsgs();
    toast(`✦ ${newCrew.name} 호출됐어요!`);
  } catch(e){
    removeLoading();
    newHist.push({role:'assistant', content:'⚠️ 호출 중 오류: ' + (e.message||'다시 시도해주세요')});
    setHist(newHist); renderMsgs();
  }
}

    document.body.prepend(banner);
  }

(function(){
  const PW = 'seon9981';
  const SK_AUTH = 'seon_auth_v1';

  function lockDotSync(el){
    const dots = document.querySelectorAll('.lock-dot');
    dots.forEach((d,i) => d.classList.toggle('on', i < el.value.length));
  }
  window.lockDotSync = lockDotSync;

  function lockCheck(){
    const val = document.getElementById('lockInput')?.value || '';
    const err = document.getElementById('lockErr');
    if(val === PW){
      localStorage.setItem(SK_AUTH, Date.now().toString());
      document.getElementById('lockScreen')?.classList.add('hide');
      if(err) err.textContent = '';
    } else {
      if(err) err.textContent = '비밀번호가 틀렸어요';
      const input = document.getElementById('lockInput');
      if(input){
        input.value = '';
        lockDotSync(input);
        input.style.borderColor = '#dc2626';
        setTimeout(()=>{ input.style.borderColor = ''; }, 800);
      }
    }
  }
  window.lockCheck = lockCheck;

  const saved = localStorage.getItem(SK_AUTH);
  const valid = saved && (Date.now() - parseInt(saved)) < 24 * 60 * 60 * 1000;
  if(valid){
    document.getElementById('lockScreen')?.classList.add('hide');
  } else {
    setTimeout(()=>{
      const inp = document.getElementById('lockInput');
      if(inp) inp.addEventListener('input', ()=>lockDotSync(inp));
    }, 100);
    setTimeout(()=>{
      const inp = document.getElementById('lockInput');
      if(inp){
        inp.focus();
        inp.addEventListener('input', ()=>lockDotSync(inp));
      }
    }, 300);
  }
})();

boot();
